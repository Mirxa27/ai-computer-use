services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
        NEXT_PUBLIC_DEFAULT_OLLAMA_URL: ${NEXT_PUBLIC_DEFAULT_OLLAMA_URL:-http://ollama:11434}
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 3000
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      NEXT_PUBLIC_DEFAULT_OLLAMA_URL: ${NEXT_PUBLIC_DEFAULT_OLLAMA_URL:-http://ollama:11434}
    ports:
      - "3000:3000"
    restart: unless-stopped
    depends_on:
      ollama:
        condition: service_started
        required: false

  ollama:
    image: ollama/ollama:latest
    profiles: ["ollama"]
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    restart: unless-stopped

volumes:
  ollama-data:
